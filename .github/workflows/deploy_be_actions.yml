name: active aws codedeploy(fastapi backend server)

on:
  # prod 브랜치 PR시 push되면서 트리거 발생
  push:
    branches: [ "prod" ]

  # Run workflow시 시작 트리거 발생(수작업 시 prod 선택 필수)
  workflow_dispatch:
    inputs:
      tags:
        description: '(option) input additional comments'

# github_token 사용 권한
permissions:
  contents: write

# 워크플로우
# 내부 동작은 github 내 가상환경에서 실행되는 형태
jobs:
  BuildAndRunBeServer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Poetry Setup
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Poetry Build
        run: |
          # 필요시 major 적용(patch는 세 번째 숫자 증가)
          poetry version patch
          poetry install
          poetry run python tests/test_ai_reader_worker_deploy.py
          bash -n dist/run_be.sh
          bash -n dist/boot-start-api.sh
          bash -n dist/verify_backend_prod_deploy.sh
          shellcheck --severity=warning dist/run_be.sh dist/boot-start-api.sh dist/verify_backend_prod_deploy.sh
          poetry build
          git config --global user.name 'likenovel-dev'
          git config --global user.email 'infra@likenovel.net'
          git add pyproject.toml
          git commit -m "version update"
          git push
        working-directory: ./fastapi_be_server

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Write .env.production (PROD)
        run: |
          printf '%s' "${{ secrets.BACKEND_ENV_PROD }}" | tr -d '\r' > .env.production
        working-directory: ./fastapi_be_server/dist

      - name: Deploy with AWS codedeploy
        env:
          APPLICATION_NAME: ln-dep
          DEPLOY_CONFIG_NAME: CodeDeployDefault.AllAtOnce
          DEPLOY_GROUP_NAME: ln-dep-grp-back
          S3_BUCKET: ln-s3
          TAGS: ${{ inputs.tags }}
        run: |
          mkdir -p scripts
          cp ../scripts/build_story_agent_context.py ./scripts/build_story_agent_context.py
          cp ../scripts/run_ai_reader_worker.py ./scripts/run_ai_reader_worker.py
          chmod +x run_be.sh boot-start-api.sh verify_backend_prod_deploy.sh
          # *.whl, appspec.yml, run_be.sh, boot-start-api.sh, gconf.py, .env.production, init/, batch/ 압축
          zip -r $GITHUB_SHA.zip *.whl appspec.yml run_be.sh boot-start-api.sh gconf.py verify_backend_prod_deploy.sh .env.production init/ batch/ scripts/
          aws s3 cp $GITHUB_SHA.zip s3://$S3_BUCKET/$GITHUB_SHA.zip
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name $APPLICATION_NAME \
            --deployment-config-name $DEPLOY_CONFIG_NAME \
            --deployment-group-name $DEPLOY_GROUP_NAME \
            --description "backend server deploy" \
            --s3-location bucket=$S3_BUCKET,bundleType=zip,key=$GITHUB_SHA.zip \
            --query deploymentId \
            --output text)
          echo "CodeDeploy deployment id: $DEPLOY_ID"
          if ! aws deploy wait deployment-successful --deployment-id "$DEPLOY_ID"; then
            aws deploy get-deployment --deployment-id "$DEPLOY_ID" || true
            exit 1
          fi
          aws deploy get-deployment --deployment-id "$DEPLOY_ID"
          echo "(option) input additional comments: $TAGS"
        working-directory: ./fastapi_be_server/dist

      - name: Verify prod backend runtime
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/likenovel_prod_deploy_key
          chmod 600 ~/.ssh/likenovel_prod_deploy_key
          ssh -i ~/.ssh/likenovel_prod_deploy_key -o StrictHostKeyChecking=no -T ln-admin@ec2-3-34-11-39.ap-northeast-2.compute.amazonaws.com \
            'ssh -i /home/ln-admin/.ssh/ln_kp.pem -o StrictHostKeyChecking=no -T ln-admin@10.0.100.110 bash -s' < ./verify_backend_prod_deploy.sh
        working-directory: ./fastapi_be_server/dist
